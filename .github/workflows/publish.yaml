# Description : GitHub Actions npm 发布配置文件

# 使用 npm Trusted Publisher (OIDC)，无需配置 NPM_TOKEN secret。
# 需要在 npmjs.com 的 highlightjs-dax 包设置中，将当前 GitHub 仓库与 publish.yaml 绑定为 Trusted Publisher。
# 如果日志已经出现 Signed provenance statement，但随后是 E404，通常不是工作流认证失败，而是 npm 包的 Trusted Publisher 绑定或 publishing access 配置不匹配。

name: Publish highlightjs-dax to npm

on:
  push:
    tags:
      - "*"

  workflow_dispatch:

concurrency:
  group: highlightjs-dax-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
          node-version-file: ".node-version"

      - name: Check code quality
        run: vp check

      - name: Run tests
        run: vp test

      - name: Build package
        run: vp pack

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "${PACKAGE_VERSION}" != "${TAG_NAME}" ]; then
            echo "Tag ${TAG_NAME} does not match package.json version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Verify publish artifacts
        shell: bash
        run: |
          test -f dist/index.cjs
          test -f dist/index.mjs
          test -f dist/index.d.cts
          test -f dist/theme.css

      - name: Detect npm dist-tag
        id: npm_tag
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          if [[ "$PACKAGE_VERSION" == *-* ]]; then
            echo "value=beta" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          registry-url: "https://registry.npmjs.org"

      - name: Dry-run publish
        run: vp pm publish --dry-run --access public --tag ${{
          steps.npm_tag.outputs.value }} --no-git-checks -- --ignore-scripts

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        run: vp pm publish --access public --tag ${{ steps.npm_tag.outputs.value }}
          --no-git-checks -- --provenance --ignore-scripts
